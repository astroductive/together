name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  fast-tests:
    # Auth + frontend regression tests. These need no ML/DB stack, so CI stays
    # fast and reliable; the full ML suite (providers, gloss, stitch) runs with
    # the complete requirements.txt locally / in a heavier job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest \
            fastapi jinja2 \
            argon2-cffi bcrypt "python-jose[cryptography]" "pydantic[email]"

      - name: Run auth + frontend tests
        env:
          JWT_SECRET_KEY: ci-test-secret-key
        run: pytest tests/test_auth.py tests/test_templates.py -q
