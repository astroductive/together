<body class="t-scope" style="background:var(--bg);padding:28px">
<div id="root"></div>
<script type="text/babel">
const { StatCard, Card } = window.TogetherDesignSystem_58a58f;
const I = (d) => <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
function Demo(){
  return (
    <div style={{display:"flex",flexDirection:"column",gap:18,maxWidth:644}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
        <StatCard label="Session outputs" value="84" icon={I(<><path d="M2 10v4M6 6v12M10 3v18M14 8v8M18 5v14M22 10v4"/></>)} delta={12} />
        <StatCard label="Accuracy" value="94" unit="%" icon={I(<path d="m20 6-11 11-5-5"/>)} />
        <StatCard label="Latency" value="80" unit="ms" delta={-6} />
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <Card variant="solid"><div style={{fontSize:13,color:"var(--muted)"}}>Solid surface — app screens</div></Card>
        <Card variant="ink"><div style={{fontSize:13}}>Ink panel — dark feature blocks</div></Card>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
