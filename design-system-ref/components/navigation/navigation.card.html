<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0}</style>
</head>
<body class="t-scope dark" style="background:var(--bg);padding:28px">
<div id="root"></div>
<script type="text/babel">
const { NavItem, ThemeToggle } = window.TogetherDesignSystem_58a58f;
const I = (d) => <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
function Demo(){
  const [active,setActive] = React.useState("Translate");
  const [theme,setTheme] = React.useState("dark");
  const items = [
    {k:"Overview", i:<rect x="3" y="3" width="7" height="7" rx="1"/>},
    {k:"Translate", i:<path d="M5 8h14M5 8l3-3M5 8l3 3M19 16H5m14 0-3-3m3 3-3 3"/>},
    {k:"Meetings", i:<><rect x="2" y="6" width="14" height="12" rx="2"/><path d="m16 10 6-3v10l-6-3"/></>},
    {k:"History", i:<><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></>},
  ];
  return (
    <div style={{display:"flex",gap:28,alignItems:"flex-start"}}>
      <div style={{width:240,background:"var(--sidebar)",border:"1px solid var(--border)",borderRadius:18,padding:14,display:"flex",flexDirection:"column",gap:3}}>
        {items.map((it,n)=>(
          <NavItem key={it.k} active={active===it.k} dot={it.k==="History"} icon={I(it.i)} onClick={()=>setActive(it.k)}>{it.k}</NavItem>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <span className="t-eyebrow">Theme toggle</span>
        <ThemeToggle value={theme} onChange={setTheme} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
