<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0}.wrap{padding:24px}
.frame{position:relative;border-radius:var(--radius-xl);overflow:hidden;height:152px;border:1px solid var(--border)}
.frame img{width:100%;height:100%;object-fit:cover;object-position:center 35%}
.cap{position:absolute;inset-inline-start:16px;bottom:14px;font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.4)}</style></head>
<body class="t-scope">
  <div class="wrap"><div class="frame">
    <img src="../assets/auth-hero.png" alt="hands"/>
    <span class="cap">Hands first · warm daylight · shallow focus</span>
  </div></div>
</body></html>
