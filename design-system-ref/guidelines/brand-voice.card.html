<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0}.wrap{display:flex;gap:14px;padding:24px;align-items:stretch}
.chip{flex:1;border-radius:var(--radius-lg);border:1px solid var(--border);padding:18px;display:flex;flex-direction:column;justify-content:space-between;min-height:96px}</style></head>
<body class="t-scope">
  <div class="wrap">
    <div class="chip" style="background:var(--surface-solid)">
      <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)">( 02 ) — Language first</span>
      <span style="font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-.03em;color:var(--text)">Lowercase calm.</span>
    </div>
    <div class="chip" style="background:var(--ink);color:#fff">
      <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5)">Live translation</span>
      <span style="font-family:var(--font-display);font-size:28px;font-weight:700">إزيك؟</span>
    </div>
    <div class="chip" style="background:var(--teal);color:#fff">
      <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.7)">Accent</span>
      <span style="font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-.03em">بدون حواجز</span>
    </div>
  </div>
</body></html>
