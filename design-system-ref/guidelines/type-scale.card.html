<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0}.row{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--border);padding:7px 0}
.tag{font-family:var(--font-mono);font-size:11px;color:var(--faint);width:96px;flex:none}
.ex{font-family:var(--font-display);font-weight:600;letter-spacing:-.03em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}</style></head>
<body class="t-scope" style="padding:24px 28px">
  <div class="row"><span class="tag">5xl · 76</span><span class="ex" style="font-size:54px">Together</span></div>
  <div class="row"><span class="tag">3xl · 40</span><span class="ex" style="font-size:40px">Translation modes</span></div>
  <div class="row"><span class="tag">xl · 24</span><span class="ex" style="font-size:24px">One interface for every direction</span></div>
  <div class="row"><span class="tag">base · 15</span><span class="ex" style="font-size:15px;font-family:var(--font-sans);font-weight:400">Body copy in DM Sans at fifteen pixels</span></div>
  <div class="row" style="border:0"><span class="tag">xs · 12</span><span class="ex" style="font-size:12px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.2em;color:var(--muted)">Eyebrow label</span></div>
</body></html>
