<!-- @dsCard group="Spacing" viewport="700x150" name="Radius" subtitle="sm → 2xl + full" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0}.wrap{display:flex;gap:16px;padding:26px;flex-wrap:wrap}
.col{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{width:74px;height:60px;background:var(--surface-2);border:1px solid var(--border-strong)}
.nm{font-family:var(--font-mono);font-size:10px;color:var(--faint)}</style></head>
<body class="t-scope">
  <div class="wrap">
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="nm">sm · 9</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius)"></div><div class="nm">base · 13</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="nm">lg · 18</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="nm">xl · 22</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="nm">2xl · 32</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-full)"></div><div class="nm">full</div></div>
  </div>
</body></html>
