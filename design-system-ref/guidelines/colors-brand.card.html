<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Teal & Sand" subtitle="Primary teal accent + warm sand secondary" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0}
  .wrap{display:flex;gap:14px;padding:24px;flex-wrap:wrap}
  .sw{flex:1;min-width:120px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
  .chip{height:74px}
  .meta{padding:10px 12px;background:var(--surface-solid)}
  .nm{font-size:12.5px;font-weight:650;color:var(--text)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--faint);margin-top:2px}
</style></head>
<body class="t-scope">
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:var(--teal)"></div><div class="meta"><div class="nm">Teal / Primary</div><div class="hex">#1F8A82 · --teal</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-strong)"></div><div class="meta"><div class="nm">Teal Strong</div><div class="hex">#16706A · --teal-strong</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sand)"></div><div class="meta"><div class="nm">Sand / Secondary</div><div class="hex">#E2B483 · --sand</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-soft)"></div><div class="meta"><div class="nm">Teal Soft</div><div class="hex">12% · --teal-soft</div></div></div>
  </div>
</body></html>
