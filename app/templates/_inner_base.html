{% extends "base.html" %}
{% block main_style %}padding-top: 60px;{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/css/theme.css?v=phase7-1">
<link rel="stylesheet" href="/static/css/ui.css?v=phase7-1">
<script src="/static/js/theme.js?v=phase7-1"></script>
<style>
  body{background:var(--bg)!important;color:var(--text)!important;font-family:var(--font-sans)!important}
  #main-content{max-width:100%!important;background:transparent!important}
  #sf-canvas{position:fixed;inset:0;z-index:-2;pointer-events:none}
  .pg-nav{position:fixed;top:0;inset-inline:0;z-index:100;display:flex;align-items:center;padding:0 28px;height:58px;background:color-mix(in srgb,var(--bg) 75%,transparent);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
  .pg-nav-logo{display:flex;align-items:center;text-decoration:none}
  .pg-nav-logo img{height:38px;width:auto}
  .pg-nav-logo span{display:none}
  .pg-nav-back{margin-inline-start:auto;padding:7px 14px;border-radius:var(--radius-full);font-size:13px;font-weight:600;color:var(--muted);text-decoration:none}
  .pg-nav-back:hover{color:var(--text);background:var(--surface)}
  .pg-nav-login{margin-inline-start:10px;padding:8px 16px;border-radius:var(--radius-full);background:var(--accent);color:#fff;font-size:13px;font-weight:700;text-decoration:none}
  .t-toggle{display:flex;border-radius:var(--radius-full);overflow:hidden;border:1px solid var(--border);background:var(--surface);margin-inline-start:12px}
  .t-toggle button{padding:5px 9px;border:none;background:transparent;color:var(--muted);cursor:pointer;line-height:0}
  .t-toggle button svg{width:15px;height:15px}
  .t-toggle button[aria-pressed="true"]{background:var(--surface-2);color:var(--accent)}
  .pg-hero{padding:80px 24px 60px;max-width:900px;margin-inline:auto}
  .pg-badge{display:inline-block;padding:5px 14px;border-radius:var(--radius-full);background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:20px}
  .pg-h1{font-family:var(--font-display);font-size:clamp(38px,6vw,68px);font-weight:800;line-height:1.06;letter-spacing:-.03em;color:var(--text)}
  .pg-h1 em{font-style:normal;color:var(--accent)}
  .pg-lead{font-size:clamp(15px,2vw,19px);color:var(--muted);line-height:1.65;max-width:620px;margin-top:18px}
  .pg-section{padding:56px 24px;max-width:900px;margin-inline:auto}
  .pg-section h2{font-family:var(--font-display);font-size:clamp(24px,4vw,36px);font-weight:800;color:var(--text);margin-bottom:16px}
  .pg-section p{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:14px}
  .spec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-top:28px}
  .spec-card{padding:22px;border-radius:var(--radius-lg);background:color-mix(in srgb,var(--surface) 82%,transparent);border:1px solid var(--border);backdrop-filter:blur(12px)}
  .spec-val{font-family:var(--font-display);font-size:30px;font-weight:800;color:var(--accent)}
  .spec-key{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:4px}
  .uc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-top:28px}
  .uc-card{padding:22px 24px;border-radius:var(--radius-lg);background:color-mix(in srgb,var(--surface) 82%,transparent);border:1px solid var(--border);backdrop-filter:blur(12px)}
  .uc-icon{width:36px;height:36px;border-radius:var(--radius);background:var(--accent-soft);display:grid;place-items:center;color:var(--accent);margin-bottom:12px}
  .uc-icon svg{width:18px;height:18px}
  .uc-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px}
  .uc-desc{font-size:13px;color:var(--muted);line-height:1.6}
  .cta-strip{background:var(--accent);border-radius:var(--radius-xl);padding:44px 32px;text-align:center;margin:32px 24px 64px;max-width:900px;margin-inline:auto;margin-bottom:64px}
  .cta-strip h3{font-family:var(--font-display);font-size:28px;font-weight:800;color:#fff;margin-bottom:14px}
  .cta-strip p{font-size:15px;color:rgba(255,255,255,.8);margin-bottom:22px}
  .cta-strip a{display:inline-block;padding:12px 26px;border-radius:var(--radius-full);background:#fff;color:var(--accent);font-weight:700;font-size:14px;text-decoration:none;margin:4px}
  .cta-strip a.sec{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
</style>
{% endblock %}
{% block nav %}
<nav class="pg-nav">
  <a href="/" class="pg-nav-logo" aria-label="Together">
    <img src="/static/img/logo-together.svg" alt="Together" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
    <span style="font-family:var(--font-display);font-weight:800;font-size:19px;color:var(--text)">Together</span>
  </a>
  <a href="/" class="pg-nav-back">← Home</a>
  <a href="/login" class="pg-nav-login">Login</a>
  <div class="t-toggle" role="group" aria-label="Color theme">
    <button type="button" data-theme-set="light" aria-pressed="false" aria-label="Light theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.4 1.4M17.6 17.6 19 19M19 5l-1.4 1.4M6.4 17.6 5 19"/></svg></button>
    <button type="button" data-theme-set="dark" aria-pressed="true" aria-label="Dark theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.8A8 8 0 1 1 11.2 3 6.2 6.2 0 0 0 21 12.8Z"/></svg></button>
  </div>
</nav>
{% endblock %}
{% block scripts %}
<script>
(function(){
  var c=document.getElementById('sf-canvas');if(!c)return;
  var ctx=c.getContext('2d'),rm=matchMedia('(prefers-reduced-motion:reduce)');
  var W,H,dots=[],mx=-999,my=-999,raf=0,N=40,DIST=130,REPEL=80,SPEED=0.3;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  function mkDot(){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*SPEED,vy:(Math.random()-.5)*SPEED,col:Math.random()<.65?'#1f8a82':'#e2b483',r:Math.random()*1.2+.8}}
  function init(){resize();dots=[];for(var i=0;i<N;i++)dots.push(mkDot())}
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<dots.length;i++){var d=dots[i];var dx=d.x-mx,dy=d.y-my,ds=dx*dx+dy*dy;if(ds<REPEL*REPEL&&ds>0){var f=(REPEL*REPEL-ds)/(REPEL*REPEL)*.8;d.vx+=dx/Math.sqrt(ds)*f*.03;d.vy+=dy/Math.sqrt(ds)*f*.03}d.vx*=.99;d.vy*=.99;d.x+=d.vx;d.y+=d.vy;if(d.x<0||d.x>W)d.vx*=-1;if(d.y<0||d.y>H)d.vy*=-1}
    for(var i=0;i<dots.length;i++)for(var j=i+1;j<dots.length;j++){var dx=dots[i].x-dots[j].x,dy=dots[i].y-dots[j].y,d2=Math.sqrt(dx*dx+dy*dy);if(d2<DIST){ctx.strokeStyle='rgba(31,138,130,'+(1-d2/DIST)*.2+')';ctx.lineWidth=.7;ctx.beginPath();ctx.moveTo(dots[i].x,dots[i].y);ctx.lineTo(dots[j].x,dots[j].y);ctx.stroke()}}
    for(var i=0;i<dots.length;i++){var d=dots[i];ctx.fillStyle=d.col+'99';ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill()}
    if(!document.hidden&&!rm.matches)raf=requestAnimationFrame(draw);
  }
  function start(){if(!raf&&!document.hidden&&!rm.matches)raf=requestAnimationFrame(draw)}
  function stop(){if(raf){cancelAnimationFrame(raf);raf=0}}
  addEventListener('resize',function(){resize()});
  addEventListener('pointermove',function(e){mx=e.clientX;my=e.clientY},{passive:true});
  document.addEventListener('visibilitychange',function(){document.hidden?stop():start()});
  init();start();
})();
</script>
{% endblock %}
